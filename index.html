<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerTracker - Track your cycle, understand your body</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Jockey+One&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Main Content -->
    <div class="main-container">
        <!-- Title and tagline - centered at top -->
        <div class="header">
            <h1 class="title">HerTracker</h1>
            <p class="tagline">Track your cycle, understand your body</p>
        </div>

        <div class="content-grid">
            <!-- Left side - Image -->
            <div class="image-container">
                <div class="image-wrapper">
                    <img src= "doctorbg.png"
                         alt="Wellness meditation"
                         class="wellness-image">
                </div>
            </div>

            <!-- Right side - Content -->
            <div class="features-section">
                <!-- Features list -->
                <div class="features-list" id="featuresList"></div>

                <!-- CTA Button -->
                <div class="cta-container">
                    <button class="cta-button">Get Started</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
