<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HerTrack</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="page auth-page active">
    <div class="auth-bg-blur auth-bg-blur-1"></div>
    <div class="auth-bg-blur auth-bg-blur-2"></div>

    <a th:href="@{/}" class="auth-back-link">
        <i data-lucide="arrow-left"></i> Back to home
    </a>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-icon">
                <i data-lucide="heart-pulse"></i>
            </div>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to your HerTrack account</p>
        </div>

        <!-- Display error message if login fails -->
        <div th:if="${error}" class="auth-error" style="color:#e11d48;text-align:center;margin-bottom:1rem;" th:text="${error}"></div>

        <form th:action="@{/checkLogin}" method="post" th:object="${account}"  class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <div class="input-with-icon">
                    <i data-lucide="user" class="input-icon"></i>
                    <input  id="username" type="text" name="username" required placeholder="Enter your username">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-with-icon">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input id="password" type="password" th:field="*{password}" name="password" required placeholder="Enter your password">
                </div>
            </div>

            <!-- CSRF token for Spring Security
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
             -->
            <button type="submit" class="btn btn-primary btn-block btn-large">Log In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a th:href="@{/signup}" class="auth-link">Sign up here</a>
        </div>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
