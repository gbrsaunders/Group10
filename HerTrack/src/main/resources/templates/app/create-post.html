<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - HerTrack</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="page active">
    <!-- Shared Navigation -->
    <div th:replace="~{fragments/nav :: app-nav}" th:with="activePage='forum'"></div>

    <main class="app-main">
        <div class="form-container">
            <div class="form-header">
                <a th:href="@{/app/forum}" class="back-btn">
                    <i data-lucide="arrow-left"></i>
                </a>
                <div>
                    <h1 class="page-title">Create Post</h1>
                    <p class="page-subtitle">Start a conversation with the community.</p>
                </div>
            </div>

            <form th:action="@{/app/create-post}" method="post" class="form-card">
                <div class="form-group">
                    <label class="form-group-label">
                        <i data-lucide="type"></i> Title
                    </label>
                    <input type="text" name="title" required class="form-input"
                           style="font-weight:600;" placeholder="Give your post a descriptive title...">
                </div>

                <div class="form-group">
                    <label class="form-group-label">
                        <i data-lucide="tag"></i> Category Tag
                    </label>
                    <select name="category" class="form-select">
                        <option value="Other">Other</option>
                        <option value="Recommendations">Recommendations</option>
                        <option value="Pregnancy Scare">Pregnancy Scare</option>
                        <option value="Mental Health">Mental Health</option>
                        <option value="Physical Health">Physical Health</option>
                        <option value="Intimate Health">Intimate Health</option>
                        <option value="Alcohol and Drug Abuse">Alcohol and Drug Abuse</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-group-label">
                        <i data-lucide="align-left"></i> Description
                    </label>
                    <textarea name="content" rows="8" required class="form-textarea"
                              placeholder="Share your thoughts, ask a question, or provide support..."></textarea>
                </div>

                <!-- CSRF token for Spring Security -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-footer" style="display:flex;justify-content:flex-end;">
                    <button type="submit" class="btn-save" style="background:#f59e0b;">
                        <i data-lucide="send"></i> Post to Forum
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<div id="toast-container"></div>

<script th:src="@{/js/shared.js}"></script>
<script>lucide.createIcons();</script>
</body>
</html>
