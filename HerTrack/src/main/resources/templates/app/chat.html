<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - HerTrack</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="page active">
    <!-- Shared Navigation -->
    <div th:replace="~{fragments/nav :: app-nav}" th:with="activePage='chat'"></div>

    <main class="app-main">
        <div class="chat-container">
            <!-- Tab Bar -->
            <div class="chat-tabs">
                <button class="chat-tab active" data-tab="anonymous" id="tab-anonymous">
                    <i data-lucide="message-circle"></i>
                    Anonymous Chat
                </button>
                <button class="chat-tab ai" data-tab="ai" id="tab-ai">
                    <i data-lucide="bot"></i>
                    AI Assistant
                </button>
            </div>

            <div class="chat-body">
                <!-- Sidebar (visible in anonymous mode) -->
                <div class="chat-sidebar" id="chat-sidebar">
                    <h3 class="sidebar-title">Rooms</h3>
                    <button class="room-btn active" data-room="general">
                        <i data-lucide="hash"></i> General
                    </button>
                    <button class="room-btn" data-room="beauty">
                        <i data-lucide="hash"></i> Beauty and Wellness
                    </button>
                    <button class="room-btn" data-room="relationships">
                        <i data-lucide="hash"></i> Relationships
                    </button>
                    <button class="room-btn" data-room="pcos">
                        <i data-lucide="hash"></i> PCOS and Endometriosis
                    </button>
                </div>

                <!-- Main Chat Area -->
                <div class="chat-main">
                    <div class="chat-messages" id="chat-messages">
                        <div class="chat-room-label">
                            <span class="room-label-tag" id="room-label">Room: General</span>
                        </div>
                        <!-- Messages are loaded dynamically by chat.js -->
                    </div>

                    <div class="chat-input-container">
                        <form class="chat-input-form" id="chat-input-form">
                            <input type="text" class="chat-input" id="chat-input"
                                   placeholder="Message #General...">
                            <button type="submit" class="chat-send-btn">
                                <i data-lucide="send"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="toast-container"></div>

<script th:src="@{/js/shared.js}"></script>
<script th:src="@{/js/chat.js}"></script>
<script>lucide.createIcons();</script>
</body>
</html>
