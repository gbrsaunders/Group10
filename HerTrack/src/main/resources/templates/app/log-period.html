<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Period - HerTrack</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="page active">
    <!-- Shared Navigation -->
    <div th:replace="~{fragments/nav :: app-nav}" th:with="activePage='tracker'"></div>

    <main class="app-main">
        <div class="form-container">
            <div class="form-header">
                <a th:href="@{/app/tracker}" class="back-btn">
                    <i data-lucide="arrow-left"></i>
                </a>
                <div>
                    <h1 class="page-title">Log New Period</h1>
                    <p class="page-subtitle">Record your cycle details and daily symptoms.</p>
                </div>
            </div>

            <form th:action="@{/addCycle(accountID=${accountID})}" method="post" th:object="${cycle}" class="form-card" id="period-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-group-label">
                            <i data-lucide="calendar"></i> Start Date
                        </label>
                        <input type="date" th:field="*{startDate}" name="startDate" required class="form-input">
                    </div>

                    <div class="form-group">
                        <label class="form-group-label">
                            <i data-lucide="clock"></i> Duration (Days)
                        </label>
                        <input type="number" th:field="*{length}" name="duration" min="1" max="14" value="5" required class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-group-label">
                        <i data-lucide="activity"></i> Symptoms
                    </label>
                    <div class="symptoms-grid">
                        <button type="button" class="symptom-btn" data-symptom="cramps">Cramps</button>
                        <button type="button" class="symptom-btn" data-symptom="headache">Headache</button>
                        <button type="button" class="symptom-btn" data-symptom="bloating">Bloating</button>
                        <button type="button" class="symptom-btn" data-symptom="fatigue">Fatigue</button>
                        <button type="button" class="symptom-btn" data-symptom="moodSwings">Mood swings</button>
                        <button type="button" class="symptom-btn" data-symptom="hunger">Cravings</button>
                        <button type="button" class="symptom-btn" data-symptom="hotFlashes">Backache</button>
                        <button type="button" class="symptom-btn" data-symptom="acne">Acne</button>
                    </div>
                    <input type="checkbox" id="sym-cramps"    th:field="*{symptom.cramps}"  name="symptom.cramps"     style="display:none">
                    <input type="checkbox" id="sym-headache"  th:field="*{symptom.headache}"  name="symptom.headache"   style="display:none">
                    <input type="checkbox" id="sym-bloating"  th:field="*{symptom.nausea}" name="symptom.nausea"     style="display:none">
                    <input type="checkbox" id="sym-fatigue"   th:field="*{symptom.fatigue}"   name="symptom.fatigue"    style="display:none">
                    <input type="checkbox" id="sym-moodSwings"  th:field="*{symptom.moodSwings}" name="symptom.moodSwings" style="display:none">
                    <input type="checkbox" id="sym-hunger"      th:field="*{symptom.hunger}" name="symptom.hunger"     style="display:none">
                    <input type="checkbox" id="sym-hotFlashes"  th:field="*{symptom.hotFlashes}" name="symptom.hotFlashes" style="display:none">
                    <input type="checkbox" id="sym-acne"        th:field="*{symptom.acne}" name="symptom.acne"       style="display:none">
                </div>

                <div class="form-group">
                    <label class="form-group-label">
                        <i data-lucide="file-text"></i> Additional Details
                    </label>
                    <textarea th:field="*{notes}" rows="4" class="form-textarea"
                              placeholder="Add any extra notes about flow, mood, or medication..."></textarea>
                </div>

                <!-- CSRF token for Spring Security
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                -->

                <div class="form-footer">
                    <button type="submit" class="btn-save">
                        <i data-lucide="save"></i> Save Log
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<div id="toast-container"></div>

<script th:src="@{/js/shared.js}"></script>
<script th:src="@{/js/log-period.js}"></script>
<script>lucide.createIcons();</script>
</body>
</html>
