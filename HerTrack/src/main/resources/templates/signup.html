<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - HerTrack</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="loginpage auth-page active">
    <div class="auth-bg-blur auth-bg-blur-1"></div>
    <div class="auth-bg-blur auth-bg-blur-2"></div>

    <a th:href="@{/checkLogin}" class="auth-back-link">
        <i data-lucide="arrow-left"></i> Back to login
    </a>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-icon">
                <i data-lucide="heart-pulse"></i>
            </div>
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join the HerTrack community today</p>
        </div>

        <!-- Display error message if signup fails -->
        <div th:if="${error}" class="auth-error" style="color:#e11d48;text-align:center;margin-bottom:1rem;" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" th:object="${account}" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <div class="input-with-icon">
                    <i data-lucide="user" class="input-icon"></i>
                    <input type="text" th:field="*{username}" name="username" required placeholder="Choose a username">
                </div>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <div class="input-with-icon">
                    <i data-lucide="calendar" class="input-icon"></i>
                    <input type="date" name="dob" required th:field="*{dateOfBirth}">
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-with-icon">
                    <i data-lucide="mail" class="input-icon"></i>
                    <input type="email" name="email" th:field="*{email}" required placeholder="Enter your email">
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-with-icon">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input type="password" th:field="*{password}" name="password" required placeholder="Create a password">
                </div>
            </div>

            <!-- CSRF token for Spring Security

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            -->

            <button type="submit" class="btn btn-primary btn-block btn-large">Sign Up</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a th:href="@{/login}" class="auth-link">Log in here</a>
        </div>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
