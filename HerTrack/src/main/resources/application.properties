spring.application.name=HerTrack
spring.ai.huggingface.chat.api-key=KEY
spring.ai.huggingface.chat.url="https://router.huggingface.co/hf-interface/models/google/flan-t5-large/v1/chat/completions"

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
