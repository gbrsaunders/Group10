<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerTracker</title>
    <link rel="stylesheet" href="styles_dash.css">
    <link href="https://fonts.googleapis.com/css2?family=Jockey+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Title - Centered -->
        <h1 class="title">HerTracker</h1>
        
        <!-- Greeting - Left Aligned -->
        <h2 class="greeting">Hello, <span id="userName">Sarah</span></h2>
        
        <!-- Feature Boxes - Grid Layout -->
        <div class="feature-grid">
            <div class="feature-box">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1657040298726-7189d3090d5e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxjYWxlbmRhciUyMHBsYW5uZXIlMjB0cmFja2luZ3xlbnwxfHx8fDE3NzI4OTY3Nzh8MA&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral" 
                         alt="Menstrual Cycle Tracker" 
                         class="feature-image">
                </div>
                <div class="feature-text">
                    <h3>Menstrual Cycle Tracker</h3>
                </div>
            </div>

            <div class="feature-box">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1758273240403-052b3c99f636?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHx3b21lbiUyMGNvbnZlcnNhdGlvbiUyMHN1cHBvcnR8ZW58MXx8fHwxNzcyODk2Nzc4fDA&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral" 
                         alt="Anonymous Chat" 
                         class="feature-image">
                </div>
                <div class="feature-text">
                    <h3>Anonymous Chat</h3>
                </div>
            </div>

            <div class="feature-box">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1658200543015-cd38d8f25455?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHx1bml2ZXJzaXR5JTIwY2FtcHVzJTIwYm9va3N8ZW58MXx8fHwxNzcyODk2Nzc4fDA&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral" 
                         alt="University Resources" 
                         class="feature-image">
                </div>
                <div class="feature-text">
                    <h3>University Resources</h3>
                </div>
            </div>

            <div class="feature-box">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1758523418830-2729d04538a9?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxoZWxwZnVsJTIwcmVzb3VyY2VzJTIwaW5mb3JtYXRpb258ZW58MXx8fHwxNzcyODk2Nzc4fDA&ixlib=rb-4.1.0&q=80&w=1080&utm_source=figma&utm_medium=referral" 
                         alt="Extra Resources" 
                         class="feature-image">
                </div>
                <div class="feature-text">
                    <h3>Extra Resources</h3>
                </div>
            </div>
        </div>
    </div>

    <script src="script_dash.js"></script>
</body>
</html>
